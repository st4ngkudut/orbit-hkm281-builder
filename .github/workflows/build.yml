#by ST4NGKUDUT x AI (Modded for Vanilla + Local Patch HKM281 + Dynamic Vermagic + ModemManager)
name: 'Build OpenWrt Vanilla + Patch HKM281'

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'Pilih Versi/Branch OpenWrt Vanilla'
        required: true
        type: choice
        default: 'v25.12.4'
        options:
          - 'v25.12.4'
          - 'v25.12.3'
          - 'v25.12.2'
          - 'v25.12.1'
          - 'v25.12.0'
          - 'v24.10.5'
          - 'v24.10.4'
          - 'v24.10.3'
          - 'v24.10.2'
          - 'v24.10.1'
          - 'v24.10.0'
          - 'snapshot'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Kode Repositori
        uses: actions/checkout@v4

      - name: 2. Siapkan Variabel Build
        id: build_vars
        run: |
          echo "✅ Variabel build diatur untuk versi ${{ github.event.inputs.openwrt_version }}"

      - name: 3. Instal Dependensi Build
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext \
            git libncurses5-dev libssl-dev python3-setuptools rsync unzip \
            zlib1g-dev file wget ccache curl

      - name: 4. Clone Repositori OpenWrt Vanilla
        run: git clone https://git.openwrt.org/openwrt/openwrt.git ./openwrt

      - name: 5. Atur Cache Build
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir
            openwrt/dl
            openwrt/.ccache
          key: ${{ runner.os }}-openwrt-${{ github.event.inputs.openwrt_version }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ github.event.inputs.openwrt_version }}-

      - name: 6. Checkout Versi, Injeksi File Lokal, & Perbarui Feeds
        working-directory: ./openwrt
        run: |
          echo "BUILD_DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV
          
          if [ "${{ github.event.inputs.openwrt_version }}" != "snapshot" ]; then
            git checkout ${{ github.event.inputs.openwrt_version }}
          fi
          
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          echo "🛠️ 1. Menyalin file DTS kustom dari repositori lokal..."
          cp ../patches/mt7621_notion_r281.dts target/linux/ramips/dts/
          
          echo "🛠️ 2. Menyuntikkan definisi profil perangkat ke mt7621.mk..."
          echo "" >> target/linux/ramips/image/mt7621.mk
          echo "define Device/notion_r281" >> target/linux/ramips/image/mt7621.mk
          echo "  \$(Device/dsa-migration)" >> target/linux/ramips/image/mt7621.mk
          echo "  BLOCKSIZE := 128k" >> target/linux/ramips/image/mt7621.mk
          echo "  PAGESIZE := 2048" >> target/linux/ramips/image/mt7621.mk
          echo "  KERNEL_SIZE := 4096k" >> target/linux/ramips/image/mt7621.mk
          echo "  IMAGE_SIZE := 129792k" >> target/linux/ramips/image/mt7621.mk
          echo "  UBINIZE_OPTS := -E 5" >> target/linux/ramips/image/mt7621.mk
          echo "  IMAGE/sysupgrade.bin := sysupgrade-tar | append-metadata" >> target/linux/ramips/image/mt7621.mk
          echo "  DEVICE_VENDOR := Notion" >> target/linux/ramips/image/mt7621.mk
          echo "  DEVICE_MODEL := R281" >> target/linux/ramips/image/mt7621.mk
          echo "  DEVICE_PACKAGES := kmod-usb3 kmod-mt7603 kmod-mt7615e kmod-mt7663-firmware-ap kmod-usb-net-rndis kmod-usb-acm comgt-ncm uboot-envtools" >> target/linux/ramips/image/mt7621.mk
          echo "endef" >> target/linux/ramips/image/mt7621.mk
          echo "TARGET_DEVICES += notion_r281" >> target/linux/ramips/image/mt7621.mk
          
          echo "🛠️ 3. Mengatur susunan Port LAN/WAN agar tidak tertukar..."
          if [ -f target/linux/ramips/mt7621/base-files/etc/board.d/02_network ]; then
            sed -i '/mikrotik,routerboard-760igs)/i \	notion,r281)\n\t\tucidef_set_interfaces_lan_wan "lan1 lan2 lan3" "wan"\n\t\t;;\n' target/linux/ramips/mt7621/base-files/etc/board.d/02_network
          else
            echo "⚠️ File 02_network tidak ditemukan, dilewati."
          fi

          echo "🛠️ 4. Memberikan izin fitur Sysupgrade lewat Web LuCI..."
          if [ -f target/linux/ramips/mt7621/base-files/lib/upgrade/platform.sh ]; then
            sed -i '/netis,wf2881|\\/a \	notion,r281|\\' target/linux/ramips/mt7621/base-files/lib/upgrade/platform.sh
          else
            echo "⚠️ File platform.sh tidak ditemukan, dilewati."
          fi

          echo "🛠️ 5. Mendaftarkan uboot-envtools untuk pembacaan partisi..."
          if [ -f package/boot/uboot-envtools/files/ramips ]; then
            sed -i '/mts,wg430223|\\/a \	notion,r281|\\' package/boot/uboot-envtools/files/ramips
          else
            echo "⚠️ File uboot-envtools ramips tidak ditemukan, dilewati."
          fi
          
          for i in 1 2 3; do
            echo "Attempt $i to update feeds..."
            ./scripts/feeds update -a && break
            if [ $i -lt 3 ]; then
              echo "Feeds update failed. Retrying in 60 seconds..."
              sleep 60
            else
              echo "::error::Feeds update failed after 3 attempts."
              exit 1
            fi
          done
          
          ./scripts/feeds install -a

      - name: 7. Sinkronisasi Vermagic Kernel
        working-directory: ./openwrt
        run: |
          VERSION=$(echo ${{ github.event.inputs.openwrt_version }} | sed 's/^v//')
          
          if [ "$VERSION" == "snapshot" ]; then
            KMODS_URL="https://downloads.openwrt.org/snapshots/targets/ramips/mt7621/kmods/"
          else
            KMODS_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/ramips/mt7621/kmods/"
          fi
          
          echo "🔍 Mencari vermagic resmi di: $KMODS_URL"
          KMODS_DIR=$(curl -s "$KMODS_URL" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+-[0-9]+-[a-f0-9]+' | head -n 1)
          
          if [ -z "$KMODS_DIR" ]; then
            echo "::warning::Gagal menemukan vermagic resmi."
          else
            VERMAGIC_HASH=$(echo "$KMODS_DIR" | awk -F'-' '{print $NF}')
            echo "✅ Vermagic resmi ditemukan: $VERMAGIC_HASH"
            echo "$VERMAGIC_HASH" > .vermagic
            sed -i 's|grep '\''=\[ym\]'\'' $(LINUX_DIR)/.config.set \| LC_ALL=C sort \| $(MKHASH) md5 > $(LINUX_DIR)/.vermagic|cp $(TOPDIR)/.vermagic $(LINUX_DIR)/.vermagic|g' ./include/kernel-defaults.mk
            sed -i 's|STAMP_BUILT:=$(STAMP_BUILT)_$(shell $(SCRIPT_DIR)/kconfig.pl $(LINUX_DIR)/.config \| $(MKHASH) md5)|STAMP_BUILT:=$(STAMP_BUILT)_$(shell cat $(LINUX_DIR)/.vermagic)|g' ./package/kernel/linux/Makefile
          fi

      - name: 8. Terapkan Konfigurasi & Modifikasi Kustom (ModemManager Edition)
        working-directory: ./openwrt
        run: |
          echo 'CONFIG_CCACHE=y' > .config
          
          echo "CONFIG_TARGET_ramips=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7621=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7621_DEVICE_notion_r281=y" >> .config
          
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
          echo "CONFIG_PACKAGE_usbutils=y" >> .config
          
          # Driver dasar
          echo "CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net-cdc-mbim=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-serial-option=y" >> .config
          echo "CONFIG_PACKAGE_usb-modeswitch=y" >> .config
          
          # Sistem ModemManager
          echo "CONFIG_PACKAGE_modemmanager=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-modemmanager=y" >> .config
          
          make defconfig

      - name: 9. Mulai Proses Build
        working-directory: ./
        env:
          CCACHE_DIR: ${{ github.workspace }}/openwrt/.ccache
          USE_CCACHE: 1
        run: |
          ccache -s
          make -j$(nproc) -C openwrt download
          make -j$(nproc) -C openwrt world || make -j1 V=s -C openwrt world
          ccache -s

      - name: 10. Unggah Artefak Build (Unduhan Sementara)
        uses: actions/upload-artifact@v4
        with:
          name: HKM281-Vanilla-Firmware-${{ github.event.inputs.openwrt_version }}-${{ env.BUILD_DATE }}
          path: |
            ./openwrt/bin/targets/ramips/mt7621/*-sysupgrade.bin
            ./openwrt/bin/targets/ramips/mt7621/*-initramfs-kernel.bin
            ./openwrt/bin/targets/ramips/mt7621/config.buildinfo

      - name: 11. Kumpulkan Berkas untuk Rilis
        run: |
          mkdir -p ./release_files
          cp ./openwrt/bin/targets/ramips/mt7621/*-sysupgrade.bin ./release_files/ 2>/dev/null || true
          cp ./openwrt/bin/targets/ramips/mt7621/*-initramfs-kernel.bin ./release_files/ 2>/dev/null || true
          cp ./openwrt/bin/targets/ramips/mt7621/config.buildinfo ./release_files/ 2>/dev/null || true

      - name: 12. Kirim Berkas ke GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "OpenWrt HKM281 ${{ github.event.inputs.openwrt_version }} (${{ env.BUILD_DATE }})"
          tag: "${{ github.event.inputs.openwrt_version }}-${{ env.BUILD_DATE }}"
          artifacts: "./release_files/*"
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          prerelease: false
