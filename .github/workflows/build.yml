#by ST4NGKUDUT (Modded for Vanilla + Patchwork R281 + Dynamic Vermagic)
name: 'Build OpenWrt Vanilla + Patch HKM281'

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'Pilih Versi/Branch OpenWrt Vanilla'
        required: true
        type: choice
        default: 'v25.12.4'
        options:
          - 'v25.12.4'
          - 'v25.12.3'
          - 'v25.12.2'
          - 'v25.12.1'
          - 'v25.12.0'
          - 'v24.10.5'
          - 'v24.10.4'
          - 'v24.10.3'
          - 'v24.10.2'
          - 'v24.10.1'
          - 'v24.10.0'
          - 'snapshot'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Kode Repositori
        uses: actions/checkout@v4

      - name: 2. Siapkan Variabel Build
        id: build_vars
        run: |
          echo "✅ Variabel build diatur untuk versi ${{ github.event.inputs.openwrt_version }}"
          
      - name: 3. Instal Dependensi Build
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext \
            git libncurses5-dev libssl-dev python3-setuptools rsync unzip \
            zlib1g-dev file wget ccache curl

      - name: 4. Clone Repositori OpenWrt Vanilla
        run: git clone https://git.openwrt.org/openwrt/openwrt.git ./openwrt

      - name: 5. Atur Cache Build
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir
            openwrt/dl
            openwrt/.ccache
          key: ${{ runner.os }}-openwrt-${{ github.event.inputs.openwrt_version }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ github.event.inputs.openwrt_version }}-

      - name: 6. Checkout Versi, Ambil Patch, & Perbarui Feeds
        working-directory: ./openwrt
        run: |
          echo "BUILD_DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV
          
          if [ "${{ github.event.inputs.openwrt_version }}" != "snapshot" ]; then
            git checkout ${{ github.event.inputs.openwrt_version }}
          fi
          
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          echo "📥 Mengunduh patch Notion R281 dari Patchwork..."
          wget "https://patchwork.ozlabs.org/project/openwrt/patch/f77f0711719eec7d0d8892ca8ab058b2@imap4.upd.edu.ph/raw/" -O hkm281.patch
          
          echo "🛠️ Menerapkan patch ke OpenWrt Vanilla..."
          git am hkm281.patch || git apply --3way hkm281.patch || git apply --reject hkm281.patch
          
          for i in 1 2 3; do
            echo "Attempt $i to update feeds..."
            ./scripts/feeds update -a && break
            if [ $i -lt 3 ]; then
              echo "Feeds update failed. Retrying in 60 seconds..."
              sleep 60
            else
              echo "::error::Feeds update failed after 3 attempts."
              exit 1
            fi
          done
          
          ./scripts/feeds install -a

      - name: 7. Sinkronisasi Vermagic Kernel
        working-directory: ./openwrt
        run: |
          # Ambil versi dengan menghapus huruf 'v' di depan (contoh: 24.10.5)
          VERSION=$(echo ${{ github.event.inputs.openwrt_version }} | sed 's/^v//')
          
          # Tentukan URL repository kernel resmi berdasarkan versi
          if [ "$VERSION" == "snapshot" ]; then
            KMODS_URL="https://downloads.openwrt.org/snapshots/targets/ramips/mt7621/kmods/"
          else
            KMODS_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/ramips/mt7621/kmods/"
          fi
          
          echo "🔍 Mencari vermagic resmi di: $KMODS_URL"
          
          # Melakukan parsing (Scraping) untuk menemukan string folder kmods yang mengandung hash
          KMODS_DIR=$(curl -s "$KMODS_URL" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+-[0-9]+-[a-f0-9]+' | head -n 1)
          
          if [ -z "$KMODS_DIR" ]; then
            echo "::warning::Gagal menemukan vermagic di server resmi. Vermagic kustom diabaikan."
          else
            # Ekstrak hash dari string (mengambil bagian setelah tanda strip '-' terakhir)
            VERMAGIC_HASH=$(echo "$KMODS_DIR" | awk -F'-' '{print $NF}')
            echo "✅ Vermagic resmi ditemukan: $VERMAGIC_HASH"
            
            # Tulis hash ke file tersembunyi .vermagic
            echo "$VERMAGIC_HASH" > .vermagic
            
            # Ganti perintah pembuat vermagic di Makefile sistem agar menggunakan file kita
            sed -i 's|grep '\''=\[ym\]'\'' $(LINUX_DIR)/.config.set \| LC_ALL=C sort \| $(MKHASH) md5 > $(LINUX_DIR)/.vermagic|cp $(TOPDIR)/.vermagic $(LINUX_DIR)/.vermagic|g' ./include/kernel-defaults.mk
            sed -i 's|STAMP_BUILT:=$(STAMP_BUILT)_$(shell $(SCRIPT_DIR)/kconfig.pl $(LINUX_DIR)/.config \| $(MKHASH) md5)|STAMP_BUILT:=$(STAMP_BUILT)_$(shell cat $(LINUX_DIR)/.vermagic)|g' ./package/kernel/linux/Makefile
          fi

      - name: 8. Terapkan Konfigurasi & Modifikasi Kustom
        working-directory: ./openwrt
        run: |
          echo 'CONFIG_CCACHE=y' > .config
          
          # Konfigurasi Target Hardware (Hasil Patch)
          echo "CONFIG_TARGET_ramips=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7621=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7621_DEVICE_notion_r281=y" >> .config
          
          # [1] PAKET GUI UTAMA
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
          
          # [2] DRIVER & PROTOKOL MODEM (PENTING)
          echo "CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y" >> .config
          echo "CONFIG_PACKAGE_uqmi=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net-cdc-mbim=y" >> .config
          echo "CONFIG_PACKAGE_umbim=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net-rndis=y" >> .config
          echo "CONFIG_PACKAGE_usb-modeswitch=y" >> .config
          
          # [3] PROTOKOL INTERFACE LUCI
          echo "CONFIG_PACKAGE_luci-proto-3g=y" >> .config
          
          # [4] UTENSIL DASAR (Bermanfaat untuk monitoring lewat SSH)
          echo "CONFIG_PACKAGE_htop=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          
          make defconfig

      - name: 9. Mulai Proses Build
        working-directory: ./
        env:
          CCACHE_DIR: ${{ github.workspace }}/openwrt/.ccache
          USE_CCACHE: 1
        run: |
          ccache -s
          make -j$(nproc) -C openwrt download
          make -j$(nproc) -C openwrt world || make -j1 V=s -C openwrt world
          ccache -s

      - name: 10. Unggah Artefak Build
        uses: actions/upload-artifact@v4
        with:
          name: HKM281-Vanilla-Firmware-${{ github.event.inputs.openwrt_version }}-${{ env.BUILD_DATE }}
          path: |
            ./openwrt/bin/targets/ramips/mt7621/*-sysupgrade.bin
            ./openwrt/bin/targets/ramips/mt7621/*-initramfs-kernel.bin
            ./openwrt/bin/targets/ramips/mt7621/config.buildinfo
