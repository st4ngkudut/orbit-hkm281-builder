# by ST4NGKUDUT x AI (Modded for Vanilla + Local Patch HKM281 + Dynamic Vermagic + ModemManager NCM/RNDIS Hybrid)
# Enhanced with Build Space Optimization & Advanced Staged Build Logic
name: 'Build OpenWrt Vanilla + Patch HKM281 (Hybrid)'

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'Pilih Versi/Branch OpenWrt Vanilla'
        required: true
        type: choice
        default: 'v25.12.4'
        options:
          - 'snapshot'
          - 'v25.12.4'
          - 'v23.05.4'
          - 'v23.05.3'
          - 'v23.05.2'
          - 'v23.05.1'
          - 'v23.05.0'
          - 'v22.03.6'
          - 'v22.03.5'

env:
  TZ: Asia/Jakarta
  REPO_URL: https://git.openwrt.org/openwrt/openwrt.git

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Inisialisasi Lingkungan & Zona Waktu
        run: |
          sudo timedatectl set-timezone "$TZ"
          mkdir -p workspace
          df -hT

      - name: 2. Kosongkan Ruang Penyimpanan (Maximize Build Space)
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: '4096'
          temp-reserve-mb: '2048'
          swap-size-mb: '1024'
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: 3. Checkout Kode Repositori Lokal
        uses: actions/checkout@v4

      - name: 4. Instal Dependensi Build
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib gettext \
            git libncurses5-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget ccache curl
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          df -hT

      - name: 5. Clone Repositori OpenWrt Vanilla
        run: |
          git clone $REPO_URL -b ${{ github.event.inputs.openwrt_version }} ./openwrt
          cd openwrt
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          echo "BUILD_DATE=$(date +%Y-%m-%d-%H%M)" >> $GITHUB_ENV

      - name: 6. Atur Cache Build (Ccache)
        uses: actions/cache@v4
        with:
          path: |
            openwrt/staging_dir
            openwrt/.ccache
          key: ${{ runner.os }}-openwrt-${{ github.event.inputs.openwrt_version }}-${{ hashFiles('openwrt/include/**') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ github.event.inputs.openwrt_version }}-

      - name: 7. Injeksi Patch HKM281 & Custom NCM Core
        working-directory: ./openwrt
        run: |
          echo "🛠️ 1. Menyalin file DTS kustom dari repositori lokal..."
          cp ../patches/mt7621_notion_r281.dts target/linux/ramips/dts/ 2>/dev/null || echo "⚠️ Patch DTS lokal tidak ditemukan."
          
          echo "🛠️ 2. Menyuntikkan definisi profil perangkat ke mt7621.mk..."
          cat >> target/linux/ramips/image/mt7621.mk << 'EOF'

          define Device/notion_r281
            $(Device/dsa-migration)
            BLOCKSIZE := 128k
            PAGESIZE := 2048
            KERNEL_SIZE := 4096k
            IMAGE_SIZE := 129792k
            UBINIZE_OPTS := -E 5
            IMAGE/sysupgrade.bin := sysupgrade-tar | append-metadata
            DEVICE_VENDOR := Notion
            DEVICE_MODEL := R281
            DEVICE_PACKAGES := kmod-usb3 kmod-mt7603 kmod-mt7615e kmod-mt7663-firmware-ap kmod-usb-acm kmod-usb-net-cdc-ncm kmod-usb-net-huawei-cdc-ncm comgt-ncm kmod-usb-net-qmi-wwan kmod-usb-net-cdc-mbim kmod-usb-net-rndis kmod-usb-net-cdc-ether kmod-usb-serial-option usb-modeswitch modemmanager luci-app-modemmanager uboot-envtools
          endef
          TARGET_DEVICES += notion_r281
          EOF
          
          echo "🛠️ 3. Mengatur susunan Port LAN/WAN agar tidak tertukar..."
          if [ -f target/linux/ramips/mt7621/base-files/etc/board.d/02_network ]; then
            sed -i '/mikrotik,routerboard-760igs)/i \	notion,r281)\n\t\tucidef_set_interfaces_lan_wan "lan1 lan2 lan3" "wan"\n\t\t;;\n' target/linux/ramips/mt7621/base-files/etc/board.d/02_network
          fi

          echo "🛠️ 4. Memberikan izin fitur Sysupgrade lewat Web LuCI..."
          if [ -f target/linux/ramips/mt7621/base-files/lib/upgrade/platform.sh ]; then
            sed -i '/netis,wf2881|\\/a \	notion,r281|\\' target/linux/ramips/mt7621/base-files/lib/upgrade/platform.sh
          fi

          echo "🛠️ 5. Mendaftarkan uboot-envtools untuk pembacaan partisi..."
          if [ -f package/boot/uboot-envtools/files/ramips ]; then
            sed -i '/mts,wg430223|\\/a \	notion,r281|\\' package/boot/uboot-envtools/files/ramips
          fi

          echo "🛠️ 6. Menyalin custom NCM dialer script (ncm.sh & ncm.json) dari folder patches..."
          mkdir -p package/network/utils/comgt/files/
          cp ../patches/ncm.sh package/network/utils/comgt/files/ncm.sh 2>/dev/null || echo "⚠️ ncm.sh tidak ditemukan di folder patches lokal."
          cp ../patches/ncm.json package/network/utils/comgt/files/ncm.json 2>/dev/null || echo "⚠️ ncm.json tidak ditemukan di folder patches lokal."
          chmod +x package/network/utils/comgt/files/ncm.sh 2>/dev/null || true
          
          echo "🛠️ 7. Menambahkan Auto-Config NCM (via ttyACM0) untuk Modem Internal..."
          mkdir -p target/linux/ramips/mt7621/base-files/etc/uci-defaults
          cat >> target/linux/ramips/mt7621/base-files/etc/uci-defaults/99-init-modem-ncm << 'EOF'
          #!/bin/sh
          uci -q delete network.modem
          
          uci set network.modem=interface
          uci set network.modem.proto='ncm'
          uci set network.modem.device='/dev/ttyACM0'
          uci set network.modem.apn='internet'
          uci set network.modem.delay='5'
          uci commit network

          uci -q delete firewall.@zone[1].network
          uci add_list firewall.@zone[1].network='wan'
          uci add_list firewall.@zone[1].network='wan6'
          uci add_list firewall.@zone[1].network='modem'
          uci commit firewall
          exit 0
          EOF
          chmod +x target/linux/ramips/mt7621/base-files/etc/uci-defaults/99-init-modem-ncm

          echo "🛠️ 8. Update & Install Feeds..."
          ./scripts/feeds clean
          for i in 1 2 3; do
            ./scripts/feeds update -a && break
            sleep 15
          done
          ./scripts/feeds install -a

      - name: 8. Sinkronisasi Vermagic Kernel
        working-directory: ./openwrt
        run: |
          VERSION=$(echo ${{ github.event.inputs.openwrt_version }} | sed 's/^v//')
          if [ "$VERSION" == "snapshot" ]; then
            KMODS_URL="https://downloads.openwrt.org/snapshots/targets/ramips/mt7621/kmods/"
          else
            KMODS_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/ramips/mt7621/kmods/"
          fi
          
          echo "🔍 Mencari vermagic resmi di: $KMODS_URL"
          KMODS_DIR=$(curl -s "$KMODS_URL" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+-[0-9]+-[a-f0-9]+' | head -n 1)
          
          if [ -z "$KMODS_DIR" ]; then
            echo "::warning::Gagal menemukan vermagic resmi, lanjut menggunakan default compile."
          else
            VERMAGIC_HASH=$(echo "$KMODS_DIR" | awk -F'-' '{print $NF}')
            echo "✅ Vermagic resmi ditemukan: $VERMAGIC_HASH"
            echo "$VERMAGIC_HASH" > .vermagic
            sed -i 's|grep '\''=\[ym\]'\'' $(LINUX_DIR)/.config.set \| LC_ALL=C sort \| $(MKHASH) md5 > $(LINUX_DIR)/.vermagic|cp $(TOPDIR)/.vermagic $(LINUX_DIR)/.vermagic|g' ./include/kernel-defaults.mk
            sed -i 's|STAMP_BUILT:=$(STAMP_BUILT)_$(shell $(SCRIPT_DIR)/kconfig.pl $(LINUX_DIR)/.config \| $(MKHASH) md5)|STAMP_BUILT:=$(STAMP_BUILT)_$(shell cat $(LINUX_DIR)/.vermagic)|g' ./package/kernel/linux/Makefile
          fi

      - name: 9. Terapkan Konfigurasi Kustom & Validasi
        working-directory: ./openwrt
        run: |
          cat >> .config << 'EOF'
          CONFIG_CCACHE=y
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          CONFIG_TARGET_ramips_mt7621_DEVICE_notion_r281=y
          
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_usbutils=y
          
          # --- PONDASI WAJIB USB ---
          CONFIG_PACKAGE_kmod-usb-core=y
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-usb-net=y
          CONFIG_PACKAGE_kmod-mii=y
          
          # --- Driver Spesifik NCM ---
          CONFIG_PACKAGE_kmod-usb-net-cdc-ncm=y
          CONFIG_PACKAGE_kmod-usb-net-huawei-cdc-ncm=y
          CONFIG_PACKAGE_comgt-ncm=y
          
          # --- Driver RNDIS & ECM (Jalur Data HKM281) ---
          CONFIG_PACKAGE_kmod-usb-net-rndis=y
          CONFIG_PACKAGE_kmod-usb-net-cdc-ether=y
          
          # --- Driver Pendukung Modem ---
          CONFIG_PACKAGE_kmod-usb-serial=y
          CONFIG_PACKAGE_kmod-usb-serial-wwan=y
          CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y
          CONFIG_PACKAGE_kmod-usb-net-cdc-mbim=y
          CONFIG_PACKAGE_kmod-usb-serial-option=y
          CONFIG_PACKAGE_usb-modeswitch=y
          
          # --- Sistem ModemManager ---
          CONFIG_PACKAGE_modemmanager=y
          CONFIG_PACKAGE_luci-app-modemmanager=y
          EOF
          make defconfig
          
          echo "🔍 MEMVALIDASI PAKET: Memastikan paket tidak dihapus oleh sistem..."
          grep -q "CONFIG_PACKAGE_modemmanager=y" .config && echo "✅ ModemManager AMAN" || echo "❌ ModemManager TERHAPUS!"
          grep -q "CONFIG_PACKAGE_kmod-usb-net-rndis=y" .config && echo "✅ Driver RNDIS AMAN" || echo "❌ Driver RNDIS TERHAPUS!"

      - name: 10. Download Dependensi (DL)
        working-directory: ./openwrt
        run: |
          make download -j10
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: 11. Mulai Proses Build (Staged & Strict)
        working-directory: ./openwrt
        env:
          CCACHE_DIR: ${{ github.workspace }}/openwrt/.ccache
          USE_CCACHE: 1
        run: |
          ccache -s
          echo -e "$(nproc) Thread Compile Digunakan"
          
          echo "⏳ TAHAP 1: Compile Kernel & Target Dasar..."
          make target/compile -j$(nproc) || make target/compile -j1 V=s
          
          echo "⏳ TAHAP 2: Compile Semua Paket (ModemManager, LuCI, KMOD)..."
          make package/compile -j$(nproc) || make package/compile -j1 V=s
          
          echo "⏳ TAHAP 3: Menginstal Paket ke dalam RootFS Firmware..."
          make package/install -j$(nproc) || make package/install -j1 V=s
          
          echo "⏳ TAHAP 4: Membungkus File Sysupgrade.bin..."
          make target/install -j$(nproc) || make target/install -j1 V=s
          
          ccache -s

      - name: 12. Siapkan Berkas untuk Rilis
        run: |
          mkdir -p ./release_files
          cp ./openwrt/bin/targets/ramips/mt7621/*-sysupgrade.bin ./release_files/ 2>/dev/null || true
          cp ./openwrt/bin/targets/ramips/mt7621/*-initramfs-kernel.bin ./release_files/ 2>/dev/null || true
          cp ./openwrt/bin/targets/ramips/mt7621/config.buildinfo ./release_files/ 2>/dev/null || true

      - name: 13. Kirim Berkas ke GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "OpenWrt HKM281 ${{ github.event.inputs.openwrt_version }}"
          tag: "${{ github.event.inputs.openwrt_version }}-${{ env.BUILD_DATE }}"
          artifacts: "./release_files/*"
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          prerelease: false
          body: |
            ### Build Information 🚀
            - **Target:** MediaTek MT7621 (HKM281 / Notion R281)
            - **OpenWrt Version:** ${{ github.event.inputs.openwrt_version }}
            - **Build Date:** ${{ env.BUILD_DATE }}
            - **Features:** ModemManager, Hybrid NCM-RNDIS Protocol (ttyACM0 via Custom Core), USB QMI/MBIM, Staged Build
